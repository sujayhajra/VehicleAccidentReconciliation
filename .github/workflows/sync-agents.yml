name: Sync agents to Claude Platform

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic pyyaml

      - name: Sync agents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/sync_agents.py

      - name: Commit updated agent IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/.ids.json
          if git diff --staged --quiet; then
            echo "No agent ID changes to commit."
          else
            git commit -m "Update agent IDs after sync"
            git push
          fi
